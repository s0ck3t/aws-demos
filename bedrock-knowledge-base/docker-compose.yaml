services:
  oracle-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brentwood-policy-oracle-app
    ports:
      - "8501:8501"
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_DEFAULT_REGION
      - AWS_PROFILE
      - KNOWLEDGE_BASE_ID
    volumes:
      - ~/.aws:/root/.aws:ro
    restart: unless-stopped
